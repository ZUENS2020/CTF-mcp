services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BORE_DOWNLOAD_URL: ${BORE_DOWNLOAD_URL:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: ctf-backend
    ports:
      - "8000:8000"
    environment:
      - CTF_APP_ENV=dev
      - CTF_DOCKER_BASE_IMAGE=ctf-kali:latest
      - CTF_WORKSPACE_DIR=/tmp/workspace
      - CTF_COMMAND_TIMEOUT_SECONDS=30
      - CTF_BORE_BINARY=bore
      - CTF_BORE_SERVER=bore.pub
      - CTF_BORE_RESTART_BACKOFF_SECONDS=2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      kali-base:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: ctf-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  kali-base:
    build:
      context: .
      dockerfile: Dockerfile.kali
    image: ctf-kali:latest
    container_name: ctf-kali-base
    command: ["sleep", "infinity"]
