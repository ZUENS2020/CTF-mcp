services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
      provenance: false
      sbom: false
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: ctf-backend
    ports:
      - "8000:8000"
    environment:
      - CTF_APP_ENV=dev
      - CTF_DOCKER_BASE_IMAGE=${CTF_DOCKER_BASE_IMAGE:-ctf-kali:latest}
      - CTF_CONTAINER_PLATFORM=${CTF_CONTAINER_PLATFORM:-linux/amd64}
      - CTF_CONTAINER_MEM_LIMIT=${CTF_CONTAINER_MEM_LIMIT:-32g}
      - CTF_CONTAINER_NANO_CPUS=${CTF_CONTAINER_NANO_CPUS:-8000000000}
      - CTF_CONTAINER_PIDS_LIMIT=${CTF_CONTAINER_PIDS_LIMIT:-32768}
      - CTF_CONTAINER_SHM_SIZE=${CTF_CONTAINER_SHM_SIZE:-8g}
      - CTF_WORKSPACE_DIR=/tmp/workspace
      - CTF_COMMAND_TIMEOUT_SECONDS=30
      - CTF_DOCKER_API_TIMEOUT_SECONDS=${CTF_DOCKER_API_TIMEOUT_SECONDS:-15}
      - CTF_DOCKER_OPERATION_TIMEOUT_SECONDS=${CTF_DOCKER_OPERATION_TIMEOUT_SECONDS:-20}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      kali-base:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      provenance: false
      sbom: false
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: ctf-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  kali-base:
    build:
      context: ./backend
      dockerfile: Dockerfile.kali
      provenance: false
      sbom: false
      platforms:
        - linux/amd64
      args:
        KALI_MIRROR: ${KALI_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/kali}
        APT_RETRIES: ${APT_RETRIES:-8}
        APT_TIMEOUT: ${APT_TIMEOUT:-30}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        FRP_DOWNLOAD_URL: ${FRP_DOWNLOAD_URL:-}
        FRP_VERSION: ${FRP_VERSION:-v0.61.1}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: ctf-kali:latest
    platform: linux/amd64
    container_name: ctf-kali-base
    command: ["sleep", "infinity"]
